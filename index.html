<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=VT323&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />

  </head>

  <!-- ================= HTML structure =============== -->
  <body>
    <div class="page">
      <div class="page-inner">
        <div class="layout-wrap">
          <div class="content-column">
            <div class="info-block">
              <div class="info-line">
                <span class="info-label" data-i18n="labelTime">Time</span>
                <span id="clock-time" class="info-value accent-green">--:--</span>
              </div>
              <div class="info-line">
                <span class="info-label" data-i18n="labelDate">Date</span>
                <span id="clock-date" class="info-value">----</span>
              </div>
              <div class="info-line">
                <span class="info-label" data-i18n="labelDay">Day</span>
                <span id="year-dayline" class="info-value">Day -- / ---</span>
              </div>
              <div class="info-line">
                <span class="info-label" data-i18n="labelYearProgress">Year Progress</span>
                <span id="year-progressline" class="info-value info-value--nowrap">░░░░░░░░░░░░░ 0%</span>
              </div>
            </div>
            <section class="prompt-block" aria-labelledby="prompt-block-title">
              <div id="prompt-block-title" class="prompt-block-title" data-i18n="labelPrompts">プロンプト（コピー）</div>
              <div class="prompt-actions" role="group" aria-labelledby="prompt-block-title">
                <button type="button" class="prompt-btn" data-prompt-id="requirements" data-i18n="promptRequirements">要件整理</button>
                <button type="button" class="prompt-btn" data-prompt-id="review" data-i18n="promptReview">コードレビュー</button>
                <button type="button" class="prompt-btn" data-prompt-id="bug" data-i18n="promptBug">バグ切り分け</button>
                <button type="button" class="prompt-btn" data-prompt-id="learn" data-i18n="promptLearn">学習メモ</button>
              </div>
            </section>
            <div class="links-row" aria-label="リンク">
              <div class="link-item"><span class="link-label">ChatGPT</span><a href="https://chatgpt.com/" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">Gemini</span><a href="https://gemini.google.com/" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">GitHub</span><a href="https://github.com/" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">Figma</span><a href="https://www.figma.com/" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">Notion</span><a href="https://www.notion.so/" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">Gmail</span><a href="https://mail.google.com/" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">Calendar</span><a href="https://calendar.google.com/" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">Drive(My Drive)</span><a href="https://drive.google.com/drive/my-drive" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">Drive(cls)</span><a href="https://drive.google.com/drive/folders/1ea_6-lm2ltXX27QfGfSrfPDLIUc09V8o?usp=share_link" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">Drive(prv)</span><a href="https://drive.google.com/drive/folders/0B6QbBDLzSTdCUUZSQWRCdTU3Y2c?resourcekey=0-gx06fwLQ3JZveVN8ZoO1lA&amp;usp=share_link" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">YouTube</span><a href="https://www.youtube.com/" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">note</span><a href="https://note.com/" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">Amazon</span><a href="https://www.amazon.co.jp/" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">Misoca</span><a href="https://app.misoca.jp/home" target="_blank" rel="noreferrer"></a></div>
              <div class="link-item"><span class="link-label">30s Drawing</span><a href="https://www.posemaniacs.com/ja/tools/thirtyseconds" target="_blank" rel="noreferrer"></a></div>
            </div>
            <div class="slime-canvas-wrap" aria-hidden="true">
              <canvas id="slime-canvas" class="slime-canvas" width="320" height="320"></canvas>
            </div>
            <section class="translate-block" aria-labelledby="translate-toggle-label">
              <button type="button" id="translate-toggle" class="translate-toggle" aria-expanded="false" aria-controls="translate-panel">
                <span class="translate-toggle-chevron" aria-hidden="true">▶</span>
                <span id="translate-toggle-label" class="translate-toggle-text" data-i18n="labelTranslate">翻訳</span>
              </button>
              <div id="translate-panel" class="translate-panel" hidden>
                <div class="translate-header">
                  <div class="translate-langpair">
                    <select id="translate-from" class="translate-select" aria-label="翻訳元言語">
                      <option value="ja">日本語</option>
                      <option value="en">English</option>
                    </select>
                    <span class="translate-arrow" aria-hidden="true">→</span>
                    <select id="translate-to" class="translate-select" aria-label="翻訳先言語">
                      <option value="en">English</option>
                      <option value="ja">日本語</option>
                    </select>
                  </div>
                  <button type="button" id="translate-btn" class="translate-btn" data-i18n="translateAction">翻訳</button>
                </div>
                <input type="text" id="translate-input" class="translate-input" placeholder="ここにテキストを入力..." autocomplete="off" />
                <div id="translate-result" class="translate-result" aria-live="polite"></div>
              </div>
            </section>
          </div>
        </div>

        <footer>
          <div class="footer-hint statusbar-path">
            <span>~</span>/start
          </div>
          <div class="statusbar-right">
            <span id="statusbar-time" class="statusbar-time" aria-hidden="true">--:--:--</span>
            <span class="cursor-blink" aria-hidden="true"></span>
            <div class="lang-switcher" role="group" aria-label="言語">
              <button type="button" class="lang-btn" data-lang="ja" aria-pressed="true">JA</button>
              <button type="button" class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
            </div>
            <div class="footer-meta">
              <span data-i18n="footerLocalOnly">ローカル専用</span>
            </div>
          </div>
        </footer>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      (function () {
        const canvas = document.getElementById("slime-canvas");
        if (!canvas) return;

        const ctx = canvas.getContext("2d");
        if (!ctx) return;

        const img = new Image();
        // プロジェクト直下の assets/slime.png を読み込む
        img.src = "assets/slime.png";

        img.onload = function () {
          const scaleX = Math.floor(canvas.width / img.width) || 1;
          const scaleY = Math.floor(canvas.height / img.height) || 1;
          const scale = Math.max(1, Math.min(scaleX, scaleY));

          const targetWidth = img.width * scale;
          const targetHeight = img.height * scale;

          canvas.width = targetWidth;
          canvas.height = targetHeight;

          ctx.imageSmoothingEnabled = false;
          ctx.clearRect(0, 0, targetWidth, targetHeight);
          ctx.drawImage(img, 0, 0, img.width, img.height, 0, 0, targetWidth, targetHeight);
        };
      })();
    </script>
    <div id="toast" class="toast" aria-live="polite"></div>
  </body>
</html>
